      KAFKA_LISTENERS: 'BROKER://:9091,CONTROLLER://:9093,EXTERNAL://:19093,INTERNAL_CLIENT://:19096,DOCKER_CLIENT://:29096'
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://kafka-2:9091,EXTERNAL://localhost:9093,INTERNAL_CLIENT://localhost:9096,DOCKER_CLIENT://kafka-2:29096'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'BROKER'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'BROKER:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL_CLIENT:SASL_PLAINTEXT,DOCKER_CLIENT:SASL_PLAINTEXT'
      KAFKA_SASL_ENABLED_MECHANISMS: 'PLAIN'
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: 'PLAIN'
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: 'PLAIN'
      # Inter-broker client credentials (so this broker authenticates to peers as kafka-2)
      KAFKA_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka-2" password="${KAFKA_2_PASSWORD}";'
