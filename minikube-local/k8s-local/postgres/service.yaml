apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: infras-postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: infras-postgres
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: 9187
  selector:
    app: postgres
