---
# Ingress Routes Configuration
# This file contains example ingress routes for the k8s-local infrastructure
# Each service will have its own ingress route when deployed

# Example: Vault Ingress Route
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: vault-ingress
#   namespace: infras-vault
#   annotations:
#     nginx.ingress.kubernetes.io/rewrite-target: /
#     nginx.ingress.kubernetes.io/ssl-redirect: "false"
# spec:
#   ingressClassName: nginx
#   rules:
#   - host: vault.local
#     http:
#       paths:
#       - path: /
#         pathType: Prefix
#         backend:
#           service:
#             name: vault
#             port:
#               number: 8200

