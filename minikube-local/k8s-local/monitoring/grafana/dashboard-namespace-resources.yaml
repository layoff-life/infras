  k8s-namespace-resources.json: |
    {"id":null,"uid":"k8s-namespace-v1","title":"Kubernetes Namespace Resource Usage","description":"Per-namespace CPU and memory requests vs limits vs actual usage, pod counts, and resource quota consumption.","tags":["kubernetes","namespace","resources"],"style":"dark","timezone":"browser","editable":true,"schemaVersion":36,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"timepicker":{},"templating":{"list":[{"name":"namespace","label":"Namespace","type":"query","datasource":"Prometheus","query":"label_values(kube_pod_info, namespace)","refresh":2,"includeAll":true,"allValue":".*","multi":true,"hide":0,"sort":1}]},"panels":[{"id":1,"type":"row","title":"Cluster-wide Summary","gridPos":{"h":1,"w":24,"x":0,"y":0},"collapsed":false,"panels":[]},{"id":2,"type":"stat","title":"Total CPU Requested (cores)","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":0,"y":1},"targets":[{"expr":"sum(kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"cores","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":3,"type":"stat","title":"Total CPU Limits (cores)","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":6,"y":1},"targets":[{"expr":"sum(kube_pod_container_resource_limits{resource=\"cpu\", namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"cores","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"orange","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":4,"type":"stat","title":"Total Memory Requested","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":12,"y":1},"targets":[{"expr":"sum(kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":5,"type":"stat","title":"Total Memory Limits","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":18,"y":1},"targets":[{"expr":"sum(kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"orange","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":10,"type":"row","title":"Per-Namespace Breakdown","gridPos":{"h":1,"w":24,"x":0,"y":5},"collapsed":false,"panels":[]},{"id":11,"type":"bargauge","title":"CPU Requested per Namespace (cores)","datasource":"Prometheus","gridPos":{"h":10,"w":12,"x":0,"y":6},"targets":[{"expr":"sum(kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"$namespace\"}) by (namespace)","legendFormat":"{{namespace}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"cores","color":{"mode":"palette-classic"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"orientation":"horizontal","displayMode":"gradient"}},{"id":12,"type":"bargauge","title":"Memory Requested per Namespace","datasource":"Prometheus","gridPos":{"h":10,"w":12,"x":12,"y":6},"targets":[{"expr":"sum(kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"$namespace\"}) by (namespace)","legendFormat":"{{namespace}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"palette-classic"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"orientation":"horizontal","displayMode":"gradient"}},{"id":13,"type":"timeseries","title":"CPU Actual Usage per Namespace (cores)","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"}[5m])) by (namespace)","legendFormat":"{{namespace}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"cores","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line","stacking":{"group":"A","mode":"normal"}}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"table","placement":"right","calcs":["mean","last"]}}},{"id":14,"type":"timeseries","title":"Memory Actual Usage per Namespace","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"sum(container_memory_working_set_bytes{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"}) by (namespace)","legendFormat":"{{namespace}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line","stacking":{"group":"A","mode":"normal"}}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"table","placement":"right","calcs":["mean","last"]}}},{"id":20,"type":"row","title":"Pod Counts","gridPos":{"h":1,"w":24,"x":0,"y":24},"collapsed":false,"panels":[]},{"id":21,"type":"bargauge","title":"Pods per Namespace (Running)","datasource":"Prometheus","gridPos":{"h":10,"w":12,"x":0,"y":25},"targets":[{"expr":"count(kube_pod_status_phase{phase=\"Running\", namespace=~\"$namespace\"}) by (namespace)","legendFormat":"{{namespace}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","color":{"mode":"palette-classic"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"orientation":"horizontal","displayMode":"gradient"}},{"id":22,"type":"table","title":"Namespace Summary Table","datasource":"Prometheus","gridPos":{"h":10,"w":12,"x":12,"y":25},"targets":[{"expr":"count(kube_pod_status_phase{phase=\"Running\", namespace=~\"$namespace\"}) by (namespace)","format":"table","instant":true,"legendFormat":"","refId":"A"},{"expr":"sum(kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"$namespace\"}) by (namespace)","format":"table","instant":true,"legendFormat":"","refId":"B"},{"expr":"sum(kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"$namespace\"}) by (namespace)","format":"table","instant":true,"legendFormat":"","refId":"C"}],"transformations":[{"id":"merge","options":{}},{"id":"organize","options":{"excludeByName":{"Time":true},"renameByName":{"namespace":"Namespace","Value #A":"Running Pods","Value #B":"CPU Request (cores)","Value #C":"Mem Request (bytes)"},"indexByName":{"Namespace":0,"Running Pods":1,"CPU Request (cores)":2,"Mem Request (bytes)":3}}}],"fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null}]}},"overrides":[{"matcher":{"id":"byName","options":"CPU Request (cores)"},"properties":[{"id":"unit","value":"cores"}]},{"matcher":{"id":"byName","options":"Mem Request (bytes)"},"properties":[{"id":"unit","value":"bytes"}]}]},"options":{"showHeader":true,"cellHeight":"sm","sortBy":[{"desc":true,"displayName":"Running Pods"}]},"pluginVersion":"10.2.2"}],"links":[]}
