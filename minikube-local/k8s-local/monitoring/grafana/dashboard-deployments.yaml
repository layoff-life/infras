    {"id":null,"uid":"k8s-deployments-v1","title":"Kubernetes Deployments & Pods","description":"Deployment rollout status, replica health, pod resource usage (CPU/Memory vs requests/limits), OOMKills, CPU throttling, and pod restarts.","tags":["kubernetes","deployments","pods"],"style":"dark","timezone":"browser","editable":true,"schemaVersion":36,"version":1,"refresh":"30s","time":{"from":"now-3h","to":"now"},"timepicker":{},"templating":{"list":[{"name":"namespace","label":"Namespace","type":"query","datasource":"Prometheus","query":"label_values(kube_deployment_labels, namespace)","refresh":2,"includeAll":true,"allValue":".*","multi":true,"hide":0,"sort":1},{"name":"deployment","label":"Deployment","type":"query","datasource":"Prometheus","query":"label_values(kube_deployment_labels{namespace=~\"$namespace\"}, deployment)","refresh":2,"includeAll":true,"allValue":".*","multi":true,"hide":0,"sort":1}]},"panels":[{"id":1,"type":"row","title":"Deployment Health","gridPos":{"h":1,"w":24,"x":0,"y":0},"collapsed":false,"panels":[]},{"id":2,"type":"stat","title":"Total Deployments","datasource":"Prometheus","gridPos":{"h":4,"w":4,"x":0,"y":1},"targets":[{"expr":"count(kube_deployment_labels{namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":3,"type":"stat","title":"Deployments Fully Available","datasource":"Prometheus","gridPos":{"h":4,"w":4,"x":4,"y":1},"targets":[{"expr":"count(kube_deployment_status_replicas_available{namespace=~\"$namespace\"} == kube_deployment_spec_replicas{namespace=~\"$namespace\"})","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null}]}}},"options":{"colorMode":"value","