, namespace=~\"$namespace\"}) by (pod, namespace)","legendFormat":"Limit: {{namespace}}/{{pod}}","refId":"C"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"fillOpacity":5,"lineWidth":1,"drawStyle":"line"}},"overrides":[{"matcher":{"id":"byFrameRefID","options":"B"},"properties":[{"id":"custom.lineStyle","value":{"fill":"dash","dash":[4,4]}}]},{"matcher":{"id":"byFrameRefID","options":"C"},"properties":[{"id":"custom.lineStyle","value":{"fill":"dash","dash":[8,4]}}]}]},"options":{"tooltip":{"mode":"multi","sort":"desc"},"legend":{"displayMode":"table","placement":"bottom","calcs":["mean","max","last"]}}},{"id":30,"type":"row","title":"Reliability Signals","gridPos":{"h":1,"w":24,"x":0,"y":26},"collapsed":false,"panels":[]},{"id":31,"type":"timeseries","title":"CPU Throttling % per Container","description":"High throttling means CPU limits are too tight \u2014 containers are being slowed down.","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":0,"y":27},"targets":[{"expr":"rate(container_cpu_cfs_throttled_seconds_total{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"}[5m]) / rate(container_cpu_cfs_periods_total{container!=\"\", container!=\"POD\", namespace=~\"$namespace\"}[5m]) * 100","legendFormat":"{{namespace}}/{{pod}}/{{container}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":25},{"color":"red","value":50}]},"custom":{"fillOpacity":10,"lineWidth":1,"drawStyle":"line","thresholdsStyle":{"mode":"area"}}}},"options":{"tooltip":{"mode":"multi","sort":"desc"},"legend":{"displayMode":"table","placement":"bottom","calcs":["mean","max","last"]}}},{"id":32,"type":"bargauge","title":"Pod Restarts (total, top pods)","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":12,"y":27},"targets":[{"expr":"topk(20, sum(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}) by (namespace, pod)) > 0","legendFormat":