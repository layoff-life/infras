ue":75},{"color":"red","value":90}]},"custom":{"fillOpacity":10,"lineWidth":1,"drawStyle":"line","thresholdsStyle":{"mode":"area"}}}},"options":{"tooltip":{"mode":"multi","sort":"desc"},"legend":{"displayMode":"table","placement":"bottom","calcs":["last"]}}},{"id":50,"type":"row","title":"Host Docker Stats (minikube container)","gridPos":{"h":1,"w":24,"x":0,"y":49},"collapsed":false,"panels":[]},{"id":51,"type":"stat","title":"Minikube Container \u2014 CPU %","description":"CPU usage of the minikube Docker container as seen from the host machine (via docker-stats-exporter textfile).","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":0,"y":50},"targets":[{"expr":"docker_cpu_percent","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":70},{"color":"red","value":90}]}}},"options":{"colorMode":"background","graphMode":"area","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":52,"type":"gauge","title":"Minikube Container \u2014 Memory %","description":"Memory usage % of the minikube Docker container from the host perspective.","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":6,"y":50},"targets":[{"expr":"docker_memory_percent","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":70},{"color":"red","value":90}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"showThresholdMarkers":true}},{"id":53,"type":"stat","title":"Minikube Container \u2014 Memory Used","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":12,"y":50},"targets":[{"expr":"docker_memory_bytes","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":54,"type":"stat","title":"Minikube Container \u2014 Memory Limit","datasource":"Prometheus","gridPos":{"h":4,"w":6,"x":18,"y":50},"targets":[{"expr":"docker_memory_limit_bytes","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"purple","value":null}]}}},"options":{"colorMode":"value","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":55,"type":"timeseries","title":"Minikube Container \u2014 Memory Over Time","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":0,"y":54},"targets":[{"expr":"docker_memory_bytes","legendFormat":"Used","refId":"A"},{"expr":"docker_memory_limit_bytes","legendFormat":"Limit","refId":"B"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line"}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"list","placement":"bottom"}}},{"id":56,"type":"timeseries","title":"Minikube Container \u2014 Network I/O","datasource":"Prometheus","gridPos":{"h":8,"w":12,"x":12,"y":54},"targets":[{"expr":"rate(docker_net_rx_bytes[5m])","legendFormat":"RX (Received)","refId":"A"},{"expr":"- rate(docker_net_tx_bytes[5m])","legendFormat":"TX (Transmitted)","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Bps","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line"}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"list","placement":"bottom"}}},{"id":57,"type":"timeseries","title":"Minikube Container \u2014 Block I/O","datasource":"Prometheus","gridPos":{"h":8,"w":24,"x":0,"y":62},"targets":[{"expr":"rate(docker_block_read_bytes[5m])","legendFormat":"Block Read","refId":"A"},{"expr":"- rate(docker_block_write_bytes[5m])","legendFormat":"Block Write","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Bps","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line"}}},"options":{