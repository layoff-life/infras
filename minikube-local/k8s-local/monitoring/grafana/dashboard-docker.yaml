$instance.*\"}) * 100","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":75},{"color":"red","value":90}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"showThresholdMarkers":true}},{"id":5,"type":"gauge","title":"Memory Used %","datasource":"Prometheus","gridPos":{"h":4,"w":4,"x":12,"y":1},"targets":[{"expr":"((node_memory_MemTotal_bytes{instance=~\"$instance.*\"} - node_memory_MemAvailable_bytes{instance=~\"$instance.*\"}) / node_memory_MemTotal_bytes{instance=~\"$instance.*\"}) * 100","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":70},{"color":"red","value":90}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"showThresholdMarkers":true}},{"id":6,"type":"gauge","title":"Swap Used %","datasource":"Prometheus","gridPos":{"h":4,"w":4,"x":16,"y":1},"targets":[{"expr":"(node_memory_SwapTotal_bytes{instance=~\"$instance.*\"} - node_memory_SwapFree_bytes{instance=~\"$instance.*\"}) / node_memory_SwapTotal_bytes{instance=~\"$instance.*\"} * 100","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":40},{"color":"red","value":80}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"showThresholdMarkers":true}},{"id":7,"type":"stat","title":"CPU Load (1m) %","datasource":"Prometheus","gridPos":{"h":4,"w":4,"x":20,"y":1},"targets":[{"expr":"node_load1{instance=~\"$instance.*\"} / count without(cpu, mode)(node_cpu_seconds_total{mode=\"idle\", instance=~\"$instance.*\"}) * 100","legendFormat":"","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"orange","value":80},{"color":"red","value":90}]}}},"options":{"colorMode":"background","graphMode":"area","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":10,"type":"row","title":"Network Traffic","gridPos":{"h":1,"w":24,"x":0,"y":5},"panels":[]},{"id":11,"type":"timeseries","title":"Network Traffic \u2014 Server (excl. virtual interfaces)","datasource":"Prometheus","gridPos":{"h":8,"w":24,"x":0,"y":6},"targets":[{"expr":"sum(rate(node_network_receive_bytes_total{instance=~\"$instance.*\", device!~\"lo|docker.*|veth.*|br.*|cni.*\"}[5m]))","legendFormat":"Received","refId":"A"},{"expr":"- sum(rate(node_network_transmit_bytes_total{instance=~\"$instance.*\", device!~\"lo|docker.*|veth.*|br.*|cni.*\"}[5m]))","legendFormat":"Transmitted","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Bps","custom":{"fillOpacity":10,"lineWidth":2,"drawStyle":"line"}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"list","placement":"bottom"}}},{"id":20,"type":"row","title":"CPU Usage","gridPos":{"h":1,"w":24,"x":0,"y":14},"panels":[]},{"id":21,"type":"timeseries","title":"CPU Usage % \u2014 Server","datasource":"Prometheus","gridPos":{"h":8,"w":24,"x":0,"y":15},"targets":[{"expr":"100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\", instance=~\"$instance.*\"}[5m])) * 100)","legendFormat":"{{instance}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"custom":{"fillOpacity":20,"lineWidth":2,"drawStyle":"line"}}},"options":{"tooltip":{"mode":"multi"},"legend":{"displayMode":"list","placement":"bottom"}}},{"id":30,"type":"row","title":"Memory Usage","gridPos":{"h":1,"w":24,"x":0,"y":23},"panels":[]},{"id":31,"type":"timeseries","title":"Memory Used vs Total \u2014 Server","datasource":"Prometheus","gridPos":{"h":8,"w":24,"x":0,"y":24},"targets":[{"expr":"node_memory_MemTotal_bytes{instance=~\"$instance.*\"} - node_me