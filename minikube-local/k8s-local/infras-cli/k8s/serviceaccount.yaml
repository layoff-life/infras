---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infras-cli
  namespace: infras-cli
  labels:
    app: infras-cli
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infras-cli-exec
  labels:
    app: infras-cli
rules:
  # Allow pod discovery and exec in all namespaces (required for infrastructure operations)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "exec", "create"]

  # Allow ConfigMap access for service discovery
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

  # Allow access to services for endpoint discovery
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infras-cli-exec
  labels:
    app: infras-cli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infras-cli-exec
subjects:
  - kind: ServiceAccount
    name: infras-cli
    namespace: infras-cli
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infras-cli-secret-reader
  namespace: infras-vault
  labels:
    app: infras-cli
rules:
  # Allow reading Vault token secret from infras-vault namespace
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-root-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infras-cli-secret-reader
  namespace: infras-vault
  labels:
    app: infras-cli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infras-cli-secret-reader
subjects:
  - kind: ServiceAccount
    name: infras-cli
    namespace: infras-cli
