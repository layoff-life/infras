---
# Resource Quota for infras-vault namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vault-resource-quota
  namespace: infras-vault
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "500m"
    limits.memory: "1Gi"
    persistentvolumeclaims: "2"
---
# Resource Quota for infras-kafka namespace
apiVersion: v1
